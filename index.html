<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Tool acak absen dan kuis kaidah interaktif untuk kelas." />
  <title>Acak Absen & Kuis Kaidah</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Custom Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { outfit: ['Outfit', 'sans-serif'] },
          colors: {
            primary: { DEFAULT: '#7C3AED', dark: '#5B21B6', light: '#A78BFA' },
            accent: { DEFAULT: '#F59E0B', dark: '#D97706' },
            neon: { green: '#10B981', pink: '#EC4899', blue: '#3B82F6' },
          },
          animation: {
            'pulse-slow': 'pulse 2s cubic-bezier(0.4,0,0.6,1) infinite',
            'bounce-in': 'bounceIn .6s ease forwards',
            'slide-up': 'slideUp .4s ease forwards',
          },
          keyframes: {
            bounceIn: {
              '0%': { transform: 'scale(0.3)', opacity: '0' },
              '60%': { transform: 'scale(1.15)' },
              '80%': { transform: 'scale(0.95)' },
              '100%': { transform: 'scale(1)', opacity: '1' },
            },
            slideUp: {
              '0%': { transform: 'translateY(30px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
          },
        },
      },
    };
  </script>

  <link rel="stylesheet" href="style.css" />
</head>

<body
  class="font-outfit min-h-screen bg-gradient-to-br from-slate-900 via-purple-950 to-slate-900 flex flex-col items-center justify-center overflow-hidden relative">

  <!-- Floating orbs background -->
  <div class="orb orb-1" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>
  <div class="orb orb-3" aria-hidden="true"></div>

  <!-- ====== MAIN CARD ====== -->
  <main class="relative z-10 w-full max-w-lg px-4 py-8 flex flex-col items-center gap-8">

    <!-- Header -->
    <header class="text-center">

      <h1 class="text-4xl md:text-5xl font-black text-white leading-tight">
        Acak <span class="text-gradient">Absen</span><br>&amp; Kuis Kaidah
      </h1>
      <p class="mt-2 text-white/50 text-sm">Tekan tombol untuk memilih santri &amp; pertanyaan secara acak</p>
    </header>

    <!-- History chips -->
    <div id="historyContainer" class="flex flex-wrap justify-center gap-2 min-h-[2rem]"
      aria-label="Riwayat nomor terpilih"></div>

    <!-- Number Display -->
    <div class="number-display-wrapper" role="region" aria-live="polite" aria-label="Nomor absen terpilih">
      <div id="numberRing" class="number-ring">
        <div id="numberDisplay" class="number-display" aria-atomic="true">
          <span id="displayValue">?</span>
        </div>
      </div>
    </div>

    <!-- Roll Button -->
    <button id="rollBtn" aria-label="Acak Nomor Absen"
      class="roll-btn group relative overflow-hidden px-10 py-5 rounded-2xl font-black text-xl text-white shadow-2xl transition-all duration-200 active:scale-95 focus:outline-none focus-visible:ring-4 focus-visible:ring-primary-light">
      <span id="rollBtnText" class="relative z-10 flex items-center gap-3">
        <svg class="w-6 h-6 transition-transform group-hover:rotate-180 duration-500" fill="none" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        Mulai Acak
      </span>
      <div class="btn-shine" aria-hidden="true"></div>
    </button>


    <!-- Progress -->
    <div class="w-full bg-white/10 rounded-full h-2.5 overflow-hidden" role="progressbar"
      aria-label="Progres absen terpilih" id="progressBar">
      <div id="progressFill" class="progress-fill h-full rounded-full transition-all duration-700" style="width:0%">
      </div>
    </div>
    <p class="text-white/40 text-xs -mt-5" id="progressLabel">0 / 30 nomor telah terpilih</p>

  </main>

  <!-- ====== MODAL QUIZ ====== -->
  <div id="quizModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalDesc"
    class="modal-backdrop hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div id="modalCard" class="modal-card w-full max-w-md rounded-3xl p-6 md:p-8 flex flex-col gap-5 shadow-2xl">

      <!-- Modal Header: nomor besar di tengah + tombol X pojok kanan atas -->
      <div class="relative flex flex-col items-center pt-2 pb-1">
        <button id="closeModal" aria-label="Tutup modal"
          class="absolute top-0 right-0 w-9 h-9 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center text-white/70 hover:text-white transition-all duration-200 focus:outline-none focus-visible:ring-2 focus-visible:ring-white">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"
            aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
        <p class="text-xs font-semibold uppercase tracking-widest text-white/40 mb-2">Nomor Absen Terpilih</p>
        <span id="modalNumber" class="text-8xl font-black text-gradient leading-none">–</span>
      </div>

      <!-- Divider -->
      <div class="divider-line" aria-hidden="true"></div>

      <!-- Quiz Content -->
      <div id="quizContent" class="flex flex-col items-center gap-2 py-1">
        <!-- Instruksi besar —  tampil tanpa label/badge -->
        <div class="w-full bg-white/5 border border-white/10 rounded-2xl py-8 px-4 flex items-center justify-center">
          <p id="quizQuestion"
            class="text-white font-black text-3xl md:text-4xl text-center leading-tight tracking-tight"
            aria-live="polite" aria-atomic="true"></p>
        </div>

        <!-- Hidden refs for JS (not displayed) -->
        <div id="quizBadge" class="hidden"></div>
        <div id="quizHintBox" class="hidden">
          <p id="quizHint"></p>
        </div>
      </div>

      <!-- Divider -->
      <div class="divider-line" aria-hidden="true"></div>

      <!-- Actions -->
      <div class="flex">
        <button id="closeModalBtn"
          class="w-full py-3 rounded-xl bg-primary hover:bg-primary-dark font-bold text-white transition-colors duration-200 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-light">
          Selesai
        </button>
      </div>
    </div>
  </div>

  <!-- Confetti canvas -->
  <canvas id="confettiCanvas" class="fixed inset-0 pointer-events-none z-40" aria-hidden="true"></canvas>

  <!-- ====== FLOATING SETTINGS BUTTON (top-right) ====== -->
  <div class="settings-fab" id="settingsFab">
    <!-- Gear trigger button -->
    <button
      id="settingsToggle"
      class="fab-btn"
      aria-label="Pengaturan Kaidah"
      aria-expanded="false"
      aria-controls="settingsDropdown"
    >
      <svg id="gearIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>

    <!-- Dropdown panel -->
    <div id="settingsDropdown" class="settings-dropdown" aria-hidden="true">
      <p class="dropdown-title">Pengaturan Kaidah</p>
      <label class="settings-label" for="kaidahSlider">
        Soal dari Kaidah ke-1 s/d
        <span id="kaidahValueBadge" class="kaidah-badge">6</span>
      </label>
      <div class="slider-row">
        <span class="slider-min">1</span>
        <input
          type="range"
          id="kaidahSlider"
          min="1" max="10" value="6" step="1"
          class="kaidah-slider"
          aria-label="Jumlah kaidah yang dijadikan soal"
        />
        <span class="slider-max">10</span>
      </div>
      <p class="settings-hint" id="settingsHint">Soal dipilih acak dari kaidah 1–6 (12 kemungkinan soal)</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
